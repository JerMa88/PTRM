# PTRM Inference Configuration: Maze-Hard 30x30
# Matches Table 1 from arXiv:2605.19943
#
# Model: TRM-Att (5M params, H=3, L=4, attention transition, RoPE)
# Dataset: Maze-Hard (30x30, vocab=5, seq_len=900)
# PTRM paper reports: pass@25 = 85.2%, best-Q@25 = 71.3%

model:
  manifest_path: models/maze/manifest.yaml
  checkpoint_override: null

data:
  path: data/maze
  split: test
  max_samples: null

ptrm:
  K: 25
  D: 16          # Paper default for Maze
  sigma: 0.3
  seed: 42

evaluation:
  batch_size: 16   # Smaller batch due to longer sequences (seq_len=900)
  ignore_id: 0
  collect_trajectories: false
  k_chunk_size: null

device: cuda
